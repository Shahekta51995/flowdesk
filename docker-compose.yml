version: "3.9"

networks:
  flowdesk-network:
    driver: bridge

volumes:
  keycloak-data:
  starrocks-data:
  redis-data:
  superset-data:
  jenkins-data:

services:

  # ── Next.js Application ─────────────────────
  flowdesk-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowdesk-app
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - "3000:3000"
    depends_on:
      - flowdesk-keycloak
      - flowdesk-redis
      - flowdesk-starrocks
    networks:
      - flowdesk-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Nginx Reverse Proxy ─────────────────────
  flowdesk-nginx:
    image: nginx:alpine
    container_name: flowdesk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
      - "8088:8088"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flowdesk-app
      - flowdesk-keycloak
    networks:
      - flowdesk-network

  # ── Keycloak IAM ────────────────────────────
  flowdesk-keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: flowdesk-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
      KC_HTTP_ENABLED:         "true"
      KC_HOSTNAME_STRICT:      "false"
      KC_PROXY:                edge
    command: >
      start-dev
      --import-realm
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker/keycloak/flowdesk-realm.json:/opt/keycloak/data/import/flowdesk-realm.json
    ports:
      - "8081:8080"
    networks:
      - flowdesk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── StarRocks OLAP ──────────────────────────
  flowdesk-starrocks:
    image: starrocks/allin1-ubuntu:latest
    container_name: flowdesk-starrocks
    restart: unless-stopped
    ports:
      - "9030:9030"
      - "8030:8030"
    volumes:
      - starrocks-data:/data
    networks:
      - flowdesk-network
    healthcheck:
      test: ["CMD", "mysql", "-h", "127.0.0.1", "-P", "9030", "-u", "root", "-e", "SELECT 1"]
      interval: 30s
      timeout:  10s
      retries:  5

  # ── Redis Cache ─────────────────────────────
  flowdesk-redis:
    image: redis:7-alpine
    container_name: flowdesk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - flowdesk-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  3

  # ── Apache Superset ─────────────────────────
  flowdesk-superset:
    build:
      context: .
      dockerfile: docker/superset/Dockerfile
    image: flowdesk-superset:local
    container_name: flowdesk-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY:    flowdesk_superset_secret_key
      SUPERSET_LOAD_EXAMPLES: "no"
      CYPRESS_CONFIG:         "false"
    ports:
      - "8089:8088"
    volumes:
      - superset-data:/app/superset_home
      - ./docker/superset/superset_config.py:/app/pythonpath/superset_config.py
    networks:
      - flowdesk-network
    command: ["/bin/sh", "-c", "superset db upgrade && superset fab create-admin --username admin --firstname Admin --lastname User --email admin@flowdesk.com --password admin || true && superset init && gunicorn --bind 0.0.0.0:8088 --workers 2 --timeout 120 'superset.app:create_app()'"]
  # ── Jenkins CI/CD ───────────────────────────
  flowdesk-jenkins:
    image: jenkins/jenkins:lts
    container_name: flowdesk-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - flowdesk-network
    environment:
      JAVA_OPTS: "-Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true"